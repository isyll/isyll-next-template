packages:
  - 'apps/*'
  - 'packages/*'

allowBuilds:
  sharp: true
  unrs-resolver: true
  esbuild: true
  msw: false
  '@parcel/watcher': true
  '@swc/core': true
  # Sentry source-map upload tooling; only needed at release time (and fetched
  # lazily then), so we skip its install-time binary download by default.
  '@sentry/cli': false

# better-auth's kysely-adapter uses DEFAULT_MIGRATION_TABLE, removed in
# kysely 0.29.x — pin to the 0.28 line that still exports it.
overrides:
  kysely: 0.28.17

# Single source of truth for every shared dependency version across the
# monorepo. Reference with `"<pkg>": "catalog:"` in any package.json. This
# guarantees one resolved version of React, Zod, TypeScript, etc. everywhere
# (no accidental dual-version drift — e.g. the zod v3/v4 split).
catalog:
  # --- Framework / runtime ---
  next: 16.2.7
  react: 19.2.7
  react-dom: 19.2.7

  # --- Language / build ---
  typescript: 6.0.3
  turbo: 2.9.16
  tsx: 4.22.4
  dotenv: 17.4.2

  # --- Types ---
  '@types/node': ^24.10.0
  '@types/react': 19.2.17
  '@types/react-dom': 19.2.3

  # --- Validation / data ---
  zod: 4.4.3

  # --- ESLint 10 toolchain ---
  eslint: 10.4.1
  '@eslint/js': 10.0.1
  typescript-eslint: 8.61.0
  eslint-config-prettier: 10.1.8
  eslint-plugin-react: 7.37.5
  eslint-plugin-react-hooks: 7.1.1
  '@next/eslint-plugin-next': 16.2.7
  eslint-plugin-turbo: 2.9.16
  '@tanstack/eslint-plugin-query': 5.101.0
  globals: 17.6.0

  # --- Prettier ---
  prettier: 3.8.3
  prettier-plugin-tailwindcss: 0.8.0

  # --- Styling / UI ---
  tailwindcss: 4.3.0
  '@tailwindcss/postcss': 4.3.0
  tw-animate-css: 1.4.0
  '@base-ui/react': 1.5.0
  class-variance-authority: 0.7.1
  clsx: 2.1.1
  tailwind-merge: 3.6.0
  lucide-react: 1.17.0
  next-themes: 0.4.6
  motion: 12.40.0
  sonner: 2.0.7

  # --- i18n ---
  next-intl: 4.13.0

  # --- Env validation ---
  '@t3-oss/env-nextjs': 0.13.11

  # --- Observability ---
  pino: 10.3.1
  '@sentry/nextjs': 10.56.0

  # --- Redis (ioredis — full-featured, native TCP connection) ---
  ioredis: 5.11.1
  '@types/ioredis': 4.28.10

  # --- Rate limiting (ioredis-backed, in-process fallback for dev) ---

  # --- Background jobs (Postgres-backed) ---
  pg-boss: 12.18.2

  # --- Object storage (S3-compatible: AWS S3, Cloudflare R2, MinIO, ...) ---
  '@aws-sdk/client-s3': 3.1064.0
  '@aws-sdk/s3-request-presigner': 3.1064.0

  # --- Auth ---
  better-auth: 1.6.15
  jose: 6.2.3
  # Argon2id password hashing (prebuilt native bindings, incl. linux-musl).
  '@node-rs/argon2': 2.0.2

  # --- Email (Resend + React Email) ---
  resend: 6.12.4
  'react-email': 6.5.0

  # --- Reference data (generated into migrations) ---
  world-countries: 5.1.0
  countries-and-timezones: 3.9.0
  currency-codes: 2.2.0

  # --- Database (Drizzle + node-postgres) ---
  drizzle-orm: 0.45.2
  drizzle-kit: 0.31.10
  drizzle-zod: 0.8.3
  drizzle-seed: 0.4.0
  pg: 8.21.0
  '@types/pg': 8.20.0

  # --- Server actions / data layer ---
  next-safe-action: 8.5.3
  '@next-safe-action/adapter-tanstack-query': 0.1.2
  '@tanstack/react-query': 5.101.0
  '@tanstack/react-query-devtools': 5.101.0
  nuqs: 2.8.9
  zustand: 5.0.14
  server-only: 0.0.1

  # --- Forms ---
  react-hook-form: 7.78.0
  '@hookform/resolvers': 5.4.0

  # --- CLI tooling ---
  commander: 15.0.0
  picocolors: 1.1.1
  '@clack/prompts': 1.5.1

  # --- Quality / commit tooling ---
  '@commitlint/cli': 21.0.2
  '@commitlint/config-conventional': 21.0.2
  '@commitlint/types': 21.0.1
  husky: 9.1.7
  lint-staged: 17.0.7
  cspell: 10.0.1
  '@cspell/dict-fr-fr': 2.3.2
  '@cspell/dict-en_us': 4.4.35
  markdownlint-cli2: 0.22.1

  # --- Testing ---
  vitest: 4.1.8
  '@vitest/coverage-v8': 4.1.8
  '@vitejs/plugin-react': 6.0.2
  vite-tsconfig-paths: 6.1.1
  jsdom: 29.1.1
  happy-dom: 20.9.0
  '@testing-library/react': 16.3.2
  '@testing-library/dom': 10.4.1
  '@testing-library/jest-dom': 6.9.1
  '@testing-library/user-event': 14.6.1
  '@playwright/test': 1.60.0
  '@types/k6': 2.0.0

minimumReleaseAgeExclude:
  - '@aws-sdk/checksums@3.1000.1'
  - '@aws-sdk/client-s3@3.1061.0'
  - '@aws-sdk/middleware-bucket-endpoint@3.972.20'
  - '@aws-sdk/middleware-expect-continue@3.972.16'
  - '@aws-sdk/middleware-flexible-checksums@3.974.26'
  - '@aws-sdk/middleware-location-constraint@3.972.13'
  - '@aws-sdk/middleware-sdk-s3@3.972.47'
  - '@aws-sdk/middleware-ssec@3.972.13'
  - '@aws-sdk/s3-request-presigner@3.1061.0'
  - ioredis@5.11.1
