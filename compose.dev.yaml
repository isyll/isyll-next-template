name: next-monorepo-template-dev

# Fully containerized stack for trying the built image locally (no reverse
# proxy). Uses the Postgres superuser for simplicity; production switches to
# least-privilege roles (compose.prod.yaml).
#   docker compose -f compose.dev.yaml up --build

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
    ports:
      - '5432:5432'
    volumes:
      # postgres:18+ stores data in a version subdir and rejects a volume at the
      # old /var/lib/postgresql/data path — mount the parent instead.
      - db-data:/var/lib/postgresql
      - ./infra/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d app']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: redis-server --requirepass redis --save 60 1000
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'redis', '--no-auth-warning', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  migrator:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      target: migrator
    environment:
      MIGRATION_DATABASE_URL: postgres://postgres:postgres@db:5432/app
    depends_on:
      db:
        condition: service_healthy
    restart: 'no'

  # S3-compatible object storage for local dev (the app talks to it via the
  # S3_* env vars; in prod use AWS S3 / R2 / a self-hosted MinIO). Console on
  # :9001, API on :9000.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data

  # One-shot: wait for MinIO, then create the (private) uploads bucket.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb --ignore-existing local/app-uploads;
      mc anonymous set none local/app-uploads;
      "
    restart: 'no'

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      target: runner
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@db:5432/app
      ADMIN_DATABASE_URL: postgres://postgres:postgres@db:5432/app
      REDIS_URL: redis://:redis@redis:6379
      AUTH_USER_SECRET: dev-insecure-user-secret-change-me-00000000000
      AUTH_ADMIN_SECRET: dev-insecure-admin-secret-change-me-000000000
      AUTH_USER_URL: http://localhost:3000
      AUTH_ADMIN_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # Object storage → the local MinIO service.
      S3_REGION: us-east-1
      S3_BUCKET: app-uploads
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT: http://minio:9000
      S3_FORCE_PATH_STYLE: 'true'
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

  # Background worker (outbox relay) — same image/target as production so it runs
  # identically here. Override `command` to run a different worker entrypoint.
  worker:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      target: worker
    command: ['pnpm', '--filter', 'web', 'worker:outbox']
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@db:5432/app
      ADMIN_DATABASE_URL: postgres://postgres:postgres@db:5432/app
      REDIS_URL: redis://:redis@redis:6379
      AUTH_USER_SECRET: dev-insecure-user-secret-change-me-00000000000
      AUTH_ADMIN_SECRET: dev-insecure-admin-secret-change-me-000000000
      AUTH_USER_URL: http://localhost:3000
      AUTH_ADMIN_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully

volumes:
  db-data:
  redis-data:
  minio-data:
