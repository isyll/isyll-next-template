# ── TLS configuration ─────────────────────────────────────────────────────────
# Shared by all HTTPS server blocks. Included from conf.d/default.conf.
# Mozilla Intermediate compatibility: TLS 1.2 + 1.3, broad browser support.

# Protocols — TLS 1.2 is retained for compatibility; 1.3 is preferred.
ssl_protocols TLSv1.2 TLSv1.3;

# Cipher suite (Mozilla Intermediate, 2025).
# TLS 1.3 ciphers are not configurable (RFC 8446); these apply to TLS 1.2.
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384:DHE-RSA-CHACHA20-POLY1305;
ssl_prefer_server_ciphers off;

# Session resumption — reduces handshake cost for repeat visitors.
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# OCSP Stapling — attach the OCSP response to the TLS handshake.
ssl_stapling on;
ssl_stapling_verify on;
# Resolver used to fetch OCSP responses. Use your own or a public one.
resolver 1.1.1.1 8.8.8.8 valid=300s;
resolver_timeout 5s;

# Diffie-Hellman parameters (2048-bit). Generate with:
#   openssl dhparam -out /etc/nginx/certs/dhparam.pem 2048
# Then uncomment:
# ssl_dhparam /etc/nginx/certs/dhparam.pem;

# HTTP/3 early data (0-RTT) — optional, replays are possible; disable for
# sensitive POST endpoints.
ssl_early_data on;
