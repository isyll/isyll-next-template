upstream web_upstream {
  server web:3000;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name _;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  # Admin surface is NOT reachable from the public internet. The default hides
  # it (404). To expose it internally, comment out `return 404`, uncomment the
  # allow list + proxy block, and restrict to your VPN/office CIDRs.
  location /admin {
    return 404;

    # allow 10.0.0.0/8;
    # allow 192.168.0.0/16;
    # deny all;
    # proxy_pass http://web_upstream;
    # proxy_http_version 1.1;
    # proxy_set_header Host $host;
    # proxy_set_header X-Real-IP $remote_addr;
    # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://web_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 60s;
  }
}

