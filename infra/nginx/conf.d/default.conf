upstream web_upstream {
  server web:3000;
  keepalive 64;
}

# ── HTTP (port 80) ─────────────────────────────────────────────────────────
# Redirects all traffic to HTTPS except for the ACME challenge path
# (used by Certbot webroot validation).
server {
  listen 80;
  listen [::]:80;
  server_name _;

  # Let's Encrypt / Certbot ACME webroot challenge.
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
    try_files $uri =404;
  }

  # Redirect everything else to HTTPS (permanent, cacheable).
  location / {
    return 301 https://$host$request_uri;
  }
}

# ── HTTPS (port 443) ───────────────────────────────────────────────────────
# HTTP/1.1 + HTTP/2 (TCP) and HTTP/3 / QUIC (UDP).
# Enable after running Certbot to obtain certificates. Replace `example.com`
# with your domain and ensure the cert volumes are mounted (compose.prod.yaml).
#
# To obtain a certificate for the first time:
#   docker compose -f compose.prod.yaml run --rm certbot certonly \
#     --webroot -w /var/www/certbot \
#     -d example.com -d www.example.com \
#     --email admin@example.com --agree-tos --non-interactive
#
server {
  # TCP: HTTP/1.1 and HTTP/2
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;

  # UDP: HTTP/3 (QUIC) — nginx 1.30+ mainline builds include QUIC support.
  listen 443 quic reuseport;
  listen [::]:443 quic;

  server_name example.com www.example.com;

  # ── TLS certificates (Let's Encrypt via Certbot) ────────────────────────
  ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

  include /etc/nginx/conf.d/ssl.conf;

  # ── Security headers ────────────────────────────────────────────────────
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Embedder-Policy "require-corp" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;
  # HSTS — 2 years, preload-ready. Do NOT set before TLS is working end-to-end.
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  # Advertise HTTP/3 support to browsers (carried forward from previous response).
  add_header Alt-Svc 'h3=":443"; ma=86400' always;

  # ── Rate limiting ───────────────────────────────────────────────────────
  limit_req zone=global burst=20 nodelay;

  # ── Let's Encrypt renewal challenge ─────────────────────────────────────
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
    try_files $uri =404;
  }

  # ── Admin surface: hidden from the public internet ──────────────────────
  # The default is a hard 404. Operators access the admin console through a
  # VPN/internal network only. To expose it (internally), comment out the
  # `return 404`, uncomment the allow list + proxy block, and restrict to
  # your VPN CIDRs.
  location /admin {
    return 404;

    # allow 10.0.0.0/8;
    # allow 192.168.0.0/16;
    # deny all;
    # limit_req zone=api burst=10 nodelay;
    # proxy_pass http://web_upstream;
  }

  # ── Public application ───────────────────────────────────────────────────
  location / {
    limit_req zone=global burst=30 nodelay;
    proxy_pass http://web_upstream;
  }
}

