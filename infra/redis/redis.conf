# Redis configuration — used by the production service.
# Development compose mounts this file too, but with an env-override for the
# password (REDIS_PASSWORD). Tune the values below for your workload.

# ────────────────────────── Network ──────────────────────────
# Bind to all interfaces (the container network isolates it from the host).
bind 0.0.0.0
port 6379
protected-mode yes

# Maximum number of connected clients.
maxclients 256

# ────────────────────────── Security ─────────────────────────
# ACL file is injected by the compose `command` override using
# --requirepass / --aclfile at runtime so the password never lands in this file.

# Disable dangerous commands that have no business use in this template.
rename-command DEBUG ""
rename-command CONFIG ""
rename-command KEYS ""
rename-command FLUSHALL ""
rename-command FLUSHDB ""

# ────────────────────────── Memory ───────────────────────────
# Evict the least-recently-used volatile keys (with TTL) when memory is full.
# Adjust maxmemory to your host's available RAM.
maxmemory 256mb
maxmemory-policy volatile-lru

# ────────────────────────── Persistence ──────────────────────
# AOF (Append-Only File) gives durability with minimal write amplification.
# RDB snapshots are disabled (sessions are ephemeral; AOF alone is fine).
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Save snapshot every 5 minutes if at least 1 key changed (belt-and-suspenders).
save 300 1
save 60 1000

# ────────────────────────── Performance ──────────────────────
# Use 4 I/O threads for fast multi-core performance on Linux.
io-threads 4
io-threads-do-reads yes

# Enable lazy freeing so DEL/FLUSH do not block the event loop.
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# TCP keepalive — detect dead clients.
tcp-keepalive 300

# ────────────────────────── Logging ──────────────────────────
loglevel notice
logfile ""
