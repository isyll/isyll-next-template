name: next-monorepo-template-prod

# Production stack: nginx → web, a one-shot migrator, and Postgres with
# least-privilege roles. The app/admin/migrator each connect as a different
# role; the database is never published to the host. Provide a root .env first
# (see infra/docker/.env.example).
#   docker compose -f compose.prod.yaml up -d --build

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?set APP_DB_PASSWORD}
      MIGRATOR_DB_PASSWORD: ${MIGRATOR_DB_PASSWORD:?set MIGRATOR_DB_PASSWORD}
      ADMIN_DB_PASSWORD: ${ADMIN_DB_PASSWORD:?set ADMIN_DB_PASSWORD}
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./infra/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-app}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [backend]

  migrator:
    image: migrate/migrate:v4.18.1
    volumes:
      - ./packages/db/migrations:/migrations:ro
    command:
      [
        '-path=/migrations',
        '-database',
        '${MIGRATION_DATABASE_URL:?set MIGRATION_DATABASE_URL}',
        'up',
      ]
    depends_on:
      db:
        condition: service_healthy
    networks: [backend]
    restart: 'no'

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command:
      - redis-server
      - /etc/redis/redis.conf
      - --requirepass
      - ${REDIS_PASSWORD:?set REDIS_PASSWORD}
    volumes:
      - ./infra/redis/redis.conf:/etc/redis/redis.conf:ro
      - redis-data:/data
    healthcheck:
      test:
        [
          'CMD',
          'redis-cli',
          '-a',
          '${REDIS_PASSWORD}',
          '--no-auth-warning',
          'ping',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [backend]

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      target: runner
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      ADMIN_DATABASE_URL: ${ADMIN_DATABASE_URL:?set ADMIN_DATABASE_URL}
      REDIS_URL: ${REDIS_URL:?set REDIS_URL}
      AUTH_USER_SECRET: ${AUTH_USER_SECRET:?set AUTH_USER_SECRET}
      AUTH_USER_URL: ${AUTH_USER_URL:?set AUTH_USER_URL}
      AUTH_ADMIN_SECRET: ${AUTH_ADMIN_SECRET:?set AUTH_ADMIN_SECRET}
      AUTH_ADMIN_URL: ${AUTH_ADMIN_URL:?set AUTH_ADMIN_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?set NEXT_PUBLIC_APP_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks: [backend]
    restart: unless-stopped
    expose:
      - '3000'

  nginx:
    # Nginx 1.30 mainline — includes HTTP/3 (QUIC), Brotli, and modern TLS.
    # HTTP/3 requires publishing port 443 on UDP as well as TCP.
    image: nginx:1.30-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - '80:80'
      - '443:443'
      # HTTP/3 (QUIC) runs over UDP — publish alongside TCP 443.
      - '443:443/udp'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      # Certbot writes certs here; Nginx reads them.
      - certbot-certs:/etc/letsencrypt:ro
      # ACME http-01 challenge files (Nginx serves them).
      - certbot-www:/var/www/certbot:ro
    networks: [backend]

  # One-shot: issues the initial certificate. Re-run manually when needed.
  # docker compose -f compose.prod.yaml run --rm certbot certonly ...
  certbot:
    image: certbot/certbot:latest
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    networks: [backend]
    restart: unless-stopped
    depends_on:
      - nginx

networks:
  backend:

volumes:
  db-data:
  redis-data:
  certbot-certs:
  certbot-www:
