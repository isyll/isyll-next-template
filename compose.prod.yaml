name: next-monorepo-template-prod

# Production stack: nginx → web, a one-shot migrator, and Postgres with
# least-privilege roles. The app/admin/migrator each connect as a different
# role; the database is never published to the host. Provide a root .env first
# (see infra/docker/.env.example).
#   docker compose -f compose.prod.yaml up -d --build

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-app}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?set APP_DB_PASSWORD}
      MIGRATOR_DB_PASSWORD: ${MIGRATOR_DB_PASSWORD:?set MIGRATOR_DB_PASSWORD}
      ADMIN_DB_PASSWORD: ${ADMIN_DB_PASSWORD:?set ADMIN_DB_PASSWORD}
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./infra/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-app}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [backend]

  migrator:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      target: migrator
    environment:
      MIGRATION_DATABASE_URL: ${MIGRATION_DATABASE_URL:?set MIGRATION_DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    networks: [backend]
    restart: 'no'

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command:
      - redis-server
      - /etc/redis/redis.conf
      - --requirepass
      - ${REDIS_PASSWORD:?set REDIS_PASSWORD}
    volumes:
      - ./infra/redis/redis.conf:/etc/redis/redis.conf:ro
      - redis-data:/data
    healthcheck:
      test:
        [
          'CMD',
          'redis-cli',
          '-a',
          '${REDIS_PASSWORD}',
          '--no-auth-warning',
          'ping',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [backend]

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      target: runner
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      ADMIN_DATABASE_URL: ${ADMIN_DATABASE_URL:?set ADMIN_DATABASE_URL}
      REDIS_URL: ${REDIS_URL:?set REDIS_URL}
      AUTH_USER_SECRET: ${AUTH_USER_SECRET:?set AUTH_USER_SECRET}
      AUTH_USER_URL: ${AUTH_USER_URL:?set AUTH_USER_URL}
      AUTH_ADMIN_SECRET: ${AUTH_ADMIN_SECRET:?set AUTH_ADMIN_SECRET}
      AUTH_ADMIN_URL: ${AUTH_ADMIN_URL:?set AUTH_ADMIN_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?set NEXT_PUBLIC_APP_URL}
      # Object storage (optional). Point at AWS S3 / R2, or the self-hosted
      # `minio` service below (enable it with `--profile storage`). Empty = off.
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-}
      # Error tracking (optional; empty = Sentry disabled).
      SENTRY_DSN: ${SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks: [backend]
    restart: unless-stopped
    expose:
      - '3000'

  # Long-lived background worker — the outbox relay (dispatches domain events to
  # email / notifications / webhooks). Override `command` to run a different
  # entrypoint, or add more `worker`-image services for pg-boss job workers.
  # Scale with `docker compose -f compose.prod.yaml up -d --scale worker=2`
  # (claims use FOR UPDATE SKIP LOCKED, so concurrent instances are safe).
  worker:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      target: worker
    command: ['pnpm', '--filter', 'web', 'worker:outbox']
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      ADMIN_DATABASE_URL: ${ADMIN_DATABASE_URL:?set ADMIN_DATABASE_URL}
      REDIS_URL: ${REDIS_URL:?set REDIS_URL}
      AUTH_USER_SECRET: ${AUTH_USER_SECRET:?set AUTH_USER_SECRET}
      AUTH_USER_URL: ${AUTH_USER_URL:?set AUTH_USER_URL}
      AUTH_ADMIN_SECRET: ${AUTH_ADMIN_SECRET:?set AUTH_ADMIN_SECRET}
      AUTH_ADMIN_URL: ${AUTH_ADMIN_URL:?set AUTH_ADMIN_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?set NEXT_PUBLIC_APP_URL}
      # Transactional email (optional; console fallback when unset).
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      # Object storage (optional) — same vars as the web service.
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-}
      # Error tracking (optional; empty = Sentry disabled).
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks: [backend]
    restart: unless-stopped

  nginx:
    # Nginx 1.30 mainline — includes HTTP/3 (QUIC), Brotli, and modern TLS.
    # HTTP/3 requires publishing port 443 on UDP as well as TCP.
    image: nginx:1.30-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - '80:80'
      - '443:443'
      # HTTP/3 (QUIC) runs over UDP — publish alongside TCP 443.
      - '443:443/udp'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      # Certbot writes certs here; Nginx reads them.
      - certbot-certs:/etc/letsencrypt:ro
      # ACME http-01 challenge files (Nginx serves them).
      - certbot-www:/var/www/certbot:ro
    networks: [backend]

  # One-shot: issues the initial certificate. Re-run manually when needed.
  # docker compose -f compose.prod.yaml run --rm certbot certonly ...
  certbot:
    image: certbot/certbot:latest
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    networks: [backend]
    restart: unless-stopped
    depends_on:
      - nginx

  # Optional self-hosted object storage for VPS deployments. Opt-in:
  #   docker compose -f compose.prod.yaml --profile storage up -d
  # Then set S3_ENDPOINT=http://minio:9000, S3_FORCE_PATH_STYLE=true, the bucket
  # and credentials in .env. Not published to the host (reach it via the app /
  # an internal network only); use AWS S3 / R2 instead by leaving this disabled.
  minio:
    image: minio/minio:latest
    profiles: ['storage']
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:?set S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:?set S3_SECRET_ACCESS_KEY}
    volumes:
      - minio-data:/data
    networks: [backend]

  createbuckets:
    image: minio/mc:latest
    profiles: ['storage']
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 1; done;
      mc mb --ignore-existing local/$${S3_BUCKET};
      mc anonymous set none local/$${S3_BUCKET};
      "
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:?set S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:?set S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET:?set S3_BUCKET}
    networks: [backend]
    restart: 'no'

networks:
  backend:

volumes:
  db-data:
  redis-data:
  certbot-certs:
  certbot-www:
  minio-data:
