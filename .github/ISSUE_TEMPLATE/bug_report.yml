name: 🐛 Bug report
description: Report something that is not working as expected
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal, reliable steps (or a repository link).
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - web (app)
        - ui (components)
        - auth
        - db
        - core
        - tooling / CI
        - other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, browser, deployment target.
    validations:
      required: false
