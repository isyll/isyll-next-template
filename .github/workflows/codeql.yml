name: CodeQL

# Static application security testing (SAST). Runs GitHub's CodeQL engine over
# all JS/TS with the security-and-quality query suite, on every push/PR to the
# integration branches and weekly (to catch newly published query rules).

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '27 4 * * 1' # Mondays 04:27 UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          build-mode: none
          queries: security-and-quality
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'
