name: E2E

on:
  workflow_dispatch: {}
  push:
    branches: [development, production]

permissions:
  contents: read

env:
  HUSKY: 0
  DATABASE_URL: postgres://postgres:postgres@localhost:5432/app
  MIGRATION_DATABASE_URL: postgres://postgres:postgres@localhost:5432/app?sslmode=disable
  AUTH_USER_SECRET: e2e-dummy-user-secret-000000000000000000
  AUTH_ADMIN_SECRET: e2e-dummy-admin-secret-00000000000000000
  NEXT_PUBLIC_APP_URL: http://localhost:3000

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @workspace/db db:migrate
      # Install every browser the Playwright config targets (chromium, firefox,
      # webkit) — not just chromium — or the firefox/webkit projects fail.
      - run: pnpm --filter web exec playwright install --with-deps
      - run: pnpm --filter web test:e2e
        env:
          CI: 'true'
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
