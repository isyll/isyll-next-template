name: Security

# Secret scanning (gitleaks) + supply-chain review (dependency-review).
# CodeQL SAST lives in its own workflow (codeql.yml) because GitHub treats it
# specially in the Security tab.

on:
  push:
    branches: [development, production]
  pull_request:
    branches: [development]
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '27 4 * * 1' # Mondays 04:27 UTC

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so historical commits are scanned too
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan git history for secrets
        run: gitleaks git --no-banner --redact --verbose --config .gitleaks.toml

  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  audit:
    name: dependency-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Gate on known advisories. `high` (and above) fails the build; moderate/low
      # are reported but non-blocking. Triage false positives via
      # `auditConfig.ignoreCves` in pnpm-workspace.yaml — never by lowering this gate.
      - name: Audit dependencies (fail on high or critical)
        run: pnpm audit --audit-level high
