name: CI

on:
  push:
    branches: [development]
  pull_request:
    branches: [development]
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  HUSKY: 0
  SKIP_ENV_VALIDATION: '1'
  # Dummy secrets so BetterAuth doesn't error during `next build`. Never real values.
  AUTH_USER_SECRET: ci-build-dummy-user-secret-00000000000000
  AUTH_ADMIN_SECRET: ci-build-dummy-admin-secret-0000000000000
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  quality:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        task:
          [
            lint,
            typecheck,
            test,
            build,
            spellcheck,
            boundaries,
            format:check,
            lint:md,
          ]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ${{ matrix.task }}

  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec commitlint --from "origin/${{ github.base_ref }}" --to HEAD --verbose
