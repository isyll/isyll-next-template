version: 2
updates:
  - package-ecosystem: npm
    # Dependency PRs land on the integration branch, not production.
    target-branch: development
    directories:
      - '/'
      - '/apps/*'
      - '/packages/*'
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    versioning-strategy: increase
    commit-message:
      prefix: 'chore(deps)'
      prefix-development: 'chore(deps)'
    labels:
      - dependencies
      - javascript
    groups:
      production-minor-patch:
        applies-to: version-updates
        dependency-type: production
        patterns: ['*']
        update-types: [minor, patch]
      development-minor-patch:
        applies-to: version-updates
        dependency-type: development
        patterns: ['*']
        update-types: [minor, patch]
      major-updates:
        applies-to: version-updates
        patterns: ['*']
        update-types: [major]

  - package-ecosystem: github-actions
    target-branch: development
    directory: '/'
    schedule:
      interval: weekly
    commit-message:
      prefix: 'ci(deps)'
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions:
        patterns: ['*']
